<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sign Up - Habit Harvest</title>


<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}


body{

    background:#FFF8F2;

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

}



.signup-container{

    background:white;

    width:380px;

    padding:40px;

    border-radius:25px;

    box-shadow:0 15px 35px rgba(0,0,0,0.1);

    text-align:center;

}



.logo{

    font-size:60px;

    margin-bottom:10px;

}



h1{

    color:#ff7b54;

    font-size:30px;

    margin-bottom:10px;

}



.subtitle{

    color:#777;

    margin-bottom:25px;

}



input{

    width:100%;

    padding:15px;

    margin:10px 0;

    border:1px solid #ddd;

    border-radius:12px;

    font-size:16px;

    outline:none;

}



input:focus{

    border-color:#ff7b54;

}



button{

    width:100%;

    padding:15px;

    margin-top:15px;

    background:#ff7b54;

    color:white;

    border:none;

    border-radius:12px;

    font-size:18px;

    cursor:pointer;

}



button:hover{

    background:#ff5c2b;

}



.login{

    margin-top:25px;

    color:#666;

}



.login a{

    color:#ff7b54;

    text-decoration:none;

    font-weight:bold;

}



#error{

    color:red;

    font-size:14px;

    margin-top:15px;

}


</style>

</head>



<body>


<div class="signup-container">


<div class="logo">
🐶
</div>


<h1>
Create Account
</h1>


<p class="subtitle">
Start your Habit Harvest journey
</p>



<form id="signupForm">


<input 
type="text"
id="username"
placeholder="Username"
required>



<input
type="email"
id="email"
placeholder="Email Address"
required>



<input
type="password"
id="password"
placeholder="Password"
required>



<button type="submit">
Sign Up
</button>



<p id="error"></p>


</form>



<div class="login">

Already have an account?

<a href="login.html">
Login
</a>


</div>



</div>



<script type="module" src="signup.js"></script>


</body>

</html>
