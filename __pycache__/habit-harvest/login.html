<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Habit Harvest</title>


<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}


body{

    height:100vh;

    background:#FFF8F2;

    display:flex;

    justify-content:center;

    align-items:center;

}



.login-container{

    width:380px;

    background:white;

    padding:40px;

    border-radius:25px;

    box-shadow:0 15px 35px rgba(0,0,0,0.1);

    text-align:center;

}



.logo{

    font-size:60px;

    margin-bottom:10px;

}



h1{

    color:#ff7b54;

    font-size:32px;

    margin-bottom:10px;

}



.subtitle{

    color:#777;

    margin-bottom:25px;

}



input{

    width:100%;

    padding:15px;

    margin:10px 0;

    border:1px solid #ddd;

    border-radius:12px;

    font-size:16px;

    outline:none;

}



input:focus{

    border-color:#ff7b54;

}



button{

    width:100%;

    padding:15px;

    margin-top:15px;

    border:none;

    border-radius:12px;

    background:#ff7b54;

    color:white;

    font-size:18px;

    cursor:pointer;

}



button:hover{

    background:#ff5c2b;

}



.signup{

    margin-top:25px;

    color:#666;

}



.signup a{

    color:#ff7b54;

    text-decoration:none;

    font-weight:bold;

}



#error{

    color:red;

    margin-top:15px;

    font-size:14px;

}



</style>


</head>



<body>


<div class="login-container">


<div class="logo">
🐶
</div>


<h1>
Welcome Back
</h1>


<p class="subtitle">
Login to continue your Habit Harvest journey
</p>



<form id="loginForm">


<input

type="email"

id="email"

placeholder="Email Address"

required>



<input

type="password"

id="password"

placeholder="Password"

required>



<button type="submit">

Login

</button>



<p id="error"></p>


</form>




<div class="signup">

Don't have an account?

<a href="signup.html">

Create Account

</a>


</div>



</div>




<script type="module" src="login.js"></script>



</body>

</html>
