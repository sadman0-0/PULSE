<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Habit Harvest</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #FFF8F2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background: #fff;
            width: 380px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, .1);
            text-align: center;
        }

        .login-container img {
            width: 120px;
            margin-bottom: 20px;
        }

        h1 {
            color: #ff7b54;
            margin-bottom: 10px;
        }

        p {
            color: #666;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
        }

        input:focus {
            border-color: #ff7b54;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #ff7b54;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 15px;
            transition: .3s;
        }

        button:hover {
            background: #ff5c2b;
        }

        .signup {
            margin-top: 20px;
            color: #666;
        }

        .signup a {
            color: #ff7b54;
            text-decoration: none;
            font-weight: bold;
        }
    </style>

</head>

<body>

    <div class="login-container">



        <h1>Welcome 🐶</h1>

        <p>Login to continue your habit journey.</p>

        <form id="loginForm">

            <input type="email" placeholder="Email Address" required>

            <input type="password" placeholder="Password" required>

            <button type="submit">Login</button>

        </form>

        <div class="signup">
            Don't have an account?
            <a href="signup.html">Sign Up</a>
        </div>

    </div>

    <script>

        document.getElementById("loginForm").addEventListener("submit", function (event) {

            event.preventDefault();

            // Redirect to Dashboard
            window.location.href = "dashboard.html";

        });

    </script>

</body>

</html>
