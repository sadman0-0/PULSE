<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sign Up - Habit Harvest</title>


<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">


<style>

*{

    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;

}


body{

    background:#FFF8F2;

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

}



.signup-container{

    background:white;

    width:380px;

    padding:40px;

    border-radius:20px;

    box-shadow:0 10px 25px rgba(0,0,0,0.1);

    text-align:center;

}



h1{

    color:#ff7b54;

    margin-bottom:10px;

}



p{

    color:#666;

    margin-bottom:25px;

}



input{

    width:100%;

    padding:15px;

    margin:10px 0;

    border:1px solid #ddd;

    border-radius:10px;

    font-size:16px;

    outline:none;

}



input:focus{

    border-color:#ff7b54;

}



button{

    width:100%;

    padding:15px;

    background:#ff7b54;

    color:white;

    border:none;

    border-radius:10px;

    font-size:18px;

    cursor:pointer;

    margin-top:15px;

}



button:hover{

    background:#ff5c2b;

}



.login{

    margin-top:20px;

    color:#666;

}



.login a{

    color:#ff7b54;

    text-decoration:none;

    font-weight:bold;

}



</style>


</head>


<body>



<div class="signup-container">


<h1>
Join Habit Harvest 🐶
</h1>


<p>
Create your account and start your puppy journey.
</p>



<form id="signupForm">



<input

type="text"

id="username"

placeholder="Username"

required>



<input

type="email"

id="email"

placeholder="Email Address"

required>



<input

type="password"

id="password"

placeholder="Password"

required>



<button type="submit">

Create Account

</button>



</form>




<div class="login">

Already have an account?

<a href="login.html">

Login

</a>


</div>



</div>




<script type="module" src="signup.js"></script>



</body>


</html>
